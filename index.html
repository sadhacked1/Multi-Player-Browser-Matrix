<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>MULTI·PLAY — Browser Matrix v2.0</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;700&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet"/>
<style>
:root{
  --bg:#06080c;--bg2:#0b0f16;--bg3:#0f151f;--bg4:#141c27;--bg5:#192330;
  --border:#1a2840;--border2:#223050;--border3:#2a3d5a;
  --accent:#00e5ff;--accent2:#ff6b35;--accent3:#7c3aed;--accent4:#00ff88;
  --text:#ddeaf7;--text2:#7a9ab8;--text3:#3d5570;--text4:#2a3e52;
  --green:#00ff88;--red:#ff3355;--yellow:#ffc940;--purple:#a78bfa;
  --card-r:10px;--gap:12px;
  --cols:4;
}
*{box-sizing:border-box;margin:0;padding:0}
html{font-size:13px;background:var(--bg);color:var(--text);font-family:'JetBrains Mono',monospace;overflow-x:hidden}
body{min-height:100vh}
::-webkit-scrollbar{width:5px;height:5px}
::-webkit-scrollbar-track{background:var(--bg2)}
::-webkit-scrollbar-thumb{background:var(--border3);border-radius:3px}

/* ── TOPBAR ──────────────────────────────────────────────────────── */
.topbar{
  position:sticky;top:0;z-index:200;
  background:rgba(6,8,12,0.97);backdrop-filter:blur(12px);
  border-bottom:1px solid var(--border);
  padding:10px 18px;display:flex;align-items:center;gap:12px;flex-wrap:wrap;
}
.logo{font-family:'Syne',sans-serif;font-weight:800;font-size:15px;letter-spacing:-0.04em;
  background:linear-gradient(120deg,var(--accent) 0%,var(--accent3) 100%);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;
  white-space:nowrap;flex-shrink:0}
.logo sub{font-size:8px;letter-spacing:0.1em;-webkit-text-fill-color:var(--text3);font-weight:400;display:block;margin-top:-3px}
.pills{display:flex;gap:6px;align-items:center;flex-shrink:0}
.pill{padding:3px 9px;border-radius:20px;font-size:9px;letter-spacing:0.07em;
  border:1px solid var(--border2);color:var(--text3);white-space:nowrap}
.pill .v{color:var(--accent);font-weight:700}
.pill.live .v{color:var(--green)}
.topbar-mid{flex:1;display:flex;align-items:center;gap:8px;min-width:220px}
.global-vol{display:flex;align-items:center;gap:7px;flex-shrink:0}
.global-vol label{font-size:9px;color:var(--text3);letter-spacing:0.06em;white-space:nowrap}
.global-vol input[type=range]{width:80px;accent-color:var(--accent);cursor:pointer}
.topbar-btns{display:flex;gap:6px;flex-wrap:wrap;flex-shrink:0}
.btn{
  padding:6px 12px;border-radius:5px;border:1px solid var(--border2);
  background:transparent;color:var(--text2);font-family:'JetBrains Mono',monospace;
  font-size:10px;cursor:pointer;transition:all 0.12s;white-space:nowrap;letter-spacing:0.03em;
}
.btn:hover{border-color:var(--accent);color:var(--accent);background:rgba(0,229,255,0.05)}
.btn:active{transform:scale(0.97)}
.btn.primary{background:var(--accent);border-color:var(--accent);color:#000;font-weight:700}
.btn.primary:hover{background:#00c8e0;border-color:#00c8e0}
.btn.danger{border-color:var(--red)44;color:var(--red)}
.btn.danger:hover{background:rgba(255,51,85,0.1);border-color:var(--red)}
.btn.warn{border-color:var(--yellow)44;color:var(--yellow)}
.btn.warn:hover{background:rgba(255,201,64,0.08);border-color:var(--yellow)}
.btn.ghost{border-color:var(--border);color:var(--text3)}
.btn.ghost:hover{color:var(--text2);border-color:var(--border2)}
.btn.active-btn{border-color:var(--accent3);color:var(--purple);background:rgba(124,58,237,0.1)}
.view-toggle{display:flex;gap:4px}
.vt-btn{padding:5px 8px;border:1px solid var(--border);border-radius:4px;background:transparent;
  color:var(--text3);cursor:pointer;font-size:10px;transition:all 0.12s}
.vt-btn.on{background:var(--bg4);border-color:var(--border3);color:var(--accent)}
.vt-btn:hover:not(.on){border-color:var(--border2);color:var(--text2)}

/* ── BROADCAST BAR ────────────────────────────────────────────────── */
.bcast-bar{
  background:var(--bg2);border-bottom:1px solid var(--border);
  padding:10px 18px;display:flex;gap:10px;align-items:center;flex-wrap:wrap;
}
.bcast-label{font-size:9px;color:var(--text3);letter-spacing:0.08em;text-transform:uppercase;
  white-space:nowrap;flex-shrink:0;display:flex;align-items:center;gap:5px}
.bcast-label::before{content:"";width:5px;height:5px;border-radius:50%;background:var(--accent);flex-shrink:0}
.bcast-input{
  flex:1;min-width:180px;background:var(--bg3);border:1px solid var(--border2);
  border-radius:5px;padding:7px 12px;color:var(--text);
  font-family:'JetBrains Mono',monospace;font-size:11px;outline:none;transition:border-color 0.2s
}
.bcast-input:focus{border-color:var(--accent)}
.bcast-input::placeholder{color:var(--text3)}
.progress-wrap{height:2px;background:var(--border);overflow:hidden;margin:0 18px}
.progress-fill{height:100%;background:linear-gradient(90deg,var(--accent),var(--accent3));
  width:0%;transition:width 0.25s ease;border-radius:1px}

/* ── GRID ─────────────────────────────────────────────────────────── */
.main{padding:14px 18px}
.section-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
.section-title{font-family:'Syne',sans-serif;font-size:11px;font-weight:600;
  color:var(--text3);letter-spacing:0.1em;text-transform:uppercase}
.grid{
  display:grid;
  grid-template-columns:repeat(var(--cols),1fr);
  gap:var(--gap);
}
@media(max-width:900px){.grid{grid-template-columns:repeat(2,1fr)}}
@media(max-width:560px){.grid{grid-template-columns:1fr}}

/* ── CARD ─────────────────────────────────────────────────────────── */
.vcard{
  background:var(--bg2);border:1px solid var(--border);
  border-radius:var(--card-r);overflow:hidden;
  transition:border-color 0.2s,box-shadow 0.2s;
  position:relative;
  animation:cardIn 0.35s ease both;
}
@keyframes cardIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.vcard:hover{border-color:var(--border3)}
.vcard.playing{border-color:var(--accent)!important;box-shadow:0 0 0 1px rgba(0,229,255,0.15),0 4px 24px rgba(0,229,255,0.06)}
.vcard.muted-state{border-color:var(--yellow)44}
.vcard.error-state{border-color:rgba(255,51,85,0.5)!important}
.vcard.collapsed .card-body{display:none}

/* ── VIDEO AREA ───────────────────────────────────────────────────── */
.vid-wrap{position:relative;width:100%;padding-top:56.25%;background:#000;overflow:hidden;cursor:pointer}
.vid-wrap iframe,.vid-wrap video{position:absolute;top:0;left:0;width:100%;height:100%;border:none;pointer-events:auto}
.vid-placeholder{
  position:absolute;inset:0;display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  background:var(--bg3);color:var(--text3);gap:6px;
  transition:background 0.2s;
}
.vid-placeholder:hover{background:var(--bg4)}
.ph-icon{font-size:28px;opacity:0.35}
.ph-text{font-size:9px;letter-spacing:0.04em;color:var(--text4)}
.vid-status{position:absolute;top:7px;left:7px;z-index:20;display:flex;align-items:center;gap:5px}
.sdot{width:6px;height:6px;border-radius:50%;background:var(--text3);flex-shrink:0}
.sdot.live{background:var(--green);box-shadow:0 0 8px var(--green);animation:blink 2s infinite}
.sdot.muted{background:var(--yellow)}
.sdot.err{background:var(--red)}
@keyframes blink{0%,100%{opacity:1}50%{opacity:0.45}}
.slabel{font-size:8px;color:#fff;letter-spacing:0.07em;
  background:rgba(0,0,0,0.75);padding:2px 6px;border-radius:3px;backdrop-filter:blur(4px)}
.vid-corner{position:absolute;top:7px;right:7px;z-index:20;display:flex;gap:4px}
.corner-btn{
  width:22px;height:22px;border-radius:4px;border:none;
  background:rgba(0,0,0,0.7);color:#fff;font-size:11px;
  cursor:pointer;display:flex;align-items:center;justify-content:center;
  transition:background 0.15s;backdrop-filter:blur(4px)
}
.corner-btn:hover{background:rgba(0,229,255,0.3)}
.vid-title-overlay{
  position:absolute;bottom:0;left:0;right:0;z-index:15;
  padding:18px 8px 6px;
  background:linear-gradient(transparent,rgba(0,0,0,0.82));
  font-size:9px;color:#fff;letter-spacing:0.03em;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
  display:none;
}
.vcard.playing .vid-title-overlay{display:block}

/* ── CARD BODY ────────────────────────────────────────────────────── */
.card-body{padding:9px 11px 11px}

.profile-header{
  display:flex;align-items:center;gap:8px;
  margin-bottom:8px;padding-bottom:7px;border-bottom:1px solid var(--border)
}
.bbadge{
  width:26px;height:26px;border-radius:6px;display:flex;align-items:center;justify-content:center;
  font-size:14px;flex-shrink:0;border:1px solid;transition:border-color 0.2s
}
.bname{font-family:'Syne',sans-serif;font-size:11px;font-weight:700;color:var(--text);line-height:1.2}
.bver{font-size:8px;color:var(--text3);margin-top:1px}
.cnum{
  margin-left:auto;font-size:8px;color:var(--text3);
  border:1px solid var(--border);border-radius:3px;padding:1px 5px;letter-spacing:0.04em;flex-shrink:0
}

.pgrid{display:grid;grid-template-columns:1fr 1fr;gap:3px 10px;margin-bottom:7px}
.prow{display:flex;flex-direction:column;gap:1px}
.plbl{font-size:7px;color:var(--text4);letter-spacing:0.09em;text-transform:uppercase}
.pval{font-size:9px;color:var(--text2);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.pval.hi{color:var(--accent)}

.tags{display:flex;gap:3px;flex-wrap:wrap;margin-bottom:7px}
.tag{font-size:8px;padding:1px 5px;border-radius:3px;border:1px solid;letter-spacing:0.03em}
.tag.os{border-color:#1a3a5c88;color:#5ba4cf;background:rgba(13,32,53,0.6)}
.tag.dev{border-color:#1a3d1a88;color:#4ec94e;background:rgba(13,32,13,0.6)}
.tag.lang{border-color:#3d300088;color:#c9a440;background:rgba(31,24,0,0.6)}

.ua-bar{
  background:var(--bg3);border:1px solid var(--border);border-radius:3px;
  padding:4px 7px 4px 7px;font-size:7px;color:var(--text3);line-height:1.5;
  word-break:break-all;font-family:'JetBrains Mono',monospace;
  max-height:32px;overflow:hidden;position:relative;cursor:pointer;transition:border-color 0.15s
}
.ua-bar:hover{border-color:var(--border3);color:var(--text2)}
.ua-bar::after{content:"";position:absolute;bottom:0;left:0;right:0;height:12px;
  background:linear-gradient(transparent,var(--bg3));pointer-events:none}
.copy-hint{position:absolute;top:2px;right:5px;font-size:6px;color:var(--text4);z-index:2}

/* VOLUME ROW */
.vol-row{display:flex;align-items:center;gap:7px;margin-top:7px}
.vol-icon{font-size:10px;color:var(--text3);flex-shrink:0;cursor:pointer;width:14px;text-align:center}
.vol-slider{flex:1;accent-color:var(--accent);cursor:pointer;height:3px}
.vol-pct{font-size:8px;color:var(--text3);width:24px;text-align:right;flex-shrink:0}

/* CARD URL ROW */
.curl-row{display:flex;gap:5px;margin-top:7px}
.curl-input{
  flex:1;background:var(--bg3);border:1px solid var(--border);border-radius:4px;
  padding:5px 7px;color:var(--text2);font-size:9px;font-family:'JetBrains Mono',monospace;
  outline:none;transition:border-color 0.2s;min-width:0
}
.curl-input:focus{border-color:var(--accent);color:var(--text)}
.curl-input::placeholder{color:var(--text4)}
.cplay-btn{
  padding:5px 10px;background:var(--accent);border:none;border-radius:4px;
  color:#000;font-size:9px;font-weight:700;cursor:pointer;font-family:'JetBrains Mono',monospace;
  transition:background 0.15s;white-space:nowrap;flex-shrink:0
}
.cplay-btn:hover{background:#00c8e0}
.cplay-btn:active{transform:scale(0.96)}

/* CARD CONTROLS */
.ccontrols{display:flex;gap:4px;margin-top:6px}
.cc{
  flex:1;padding:4px 3px;border:1px solid var(--border2);background:transparent;
  border-radius:4px;color:var(--text3);font-size:9px;cursor:pointer;
  font-family:'JetBrains Mono',monospace;transition:all 0.12s;text-align:center;white-space:nowrap
}
.cc:hover{border-color:var(--accent);color:var(--accent);background:rgba(0,229,255,0.05)}
.cc.muted-btn{border-color:var(--yellow)55;color:var(--yellow)}
.cc.muted-btn:hover{border-color:var(--yellow);background:rgba(255,201,64,0.07)}
.cc.stop-cc:hover{border-color:var(--red);color:var(--red);background:rgba(255,51,85,0.05)}
.cc.prof-cc:hover{border-color:var(--yellow);color:var(--yellow);background:rgba(255,201,64,0.05)}
.cc.col-cc:hover{border-color:var(--purple);color:var(--purple)}

/* TOAST */
.toast{
  position:fixed;bottom:20px;right:20px;z-index:9999;
  background:var(--bg4);border:1px solid var(--border3);border-radius:6px;
  padding:8px 14px;font-size:10px;color:var(--text);
  transform:translateY(60px);opacity:0;transition:all 0.25s;pointer-events:none
}
.toast.show{transform:translateY(0);opacity:1}
</style>
</head>
<body>

<!-- TOPBAR -->
<div class="topbar">
  <div class="logo">MULTI·PLAY <sub>Browser Matrix v2.0</sub></div>
  <div class="pills">
    <div class="pill">Pool: <span class="v" id="pool-count">520</span></div>
    <div class="pill live">Active: <span class="v" id="active-count">0</span>/20</div>
    <div class="pill">Muted: <span class="v" id="muted-count">0</span></div>
  </div>
  <div class="topbar-mid">
    <div class="global-vol">
      <label>VOL ALL</label>
      <input type="range" min="0" max="100" value="80" id="global-vol-slider" oninput="setGlobalVolume(this.value)"/>
      <span id="gvol-pct" style="font-size:9px;color:var(--text3);width:26px">80%</span>
    </div>
  </div>
  <div class="topbar-btns">
    <div class="view-toggle">
      <button class="vt-btn" onclick="setcols(2)" title="2 columns">2</button>
      <button class="vt-btn" onclick="setcols(3)" title="3 columns">3</button>
      <button class="vt-btn on" onclick="setcols(4)" title="4 columns">4</button>
      <button class="vt-btn" onclick="setcols(5)" title="5 columns">5</button>
    </div>
    <button class="btn primary" onclick="playAll()">▶ Play All</button>
    <button class="btn danger" onclick="stopAll()">■ Stop All</button>
    <button class="btn warn" id="muteall-btn" onclick="toggleMuteAll()">🔇 Mute All</button>
    <button class="btn ghost" onclick="randomizeAllProfiles()">⟳ Profiles</button>
    <button class="btn ghost" onclick="loadDemo()">⚡ Demo</button>
  </div>
</div>

<!-- BROADCAST BAR -->
<div class="bcast-bar">
  <span class="bcast-label">Broadcast URL</span>
  <input class="bcast-input" id="global-url" type="text"
    placeholder="Paste YouTube / Vimeo / Direct .mp4 URL → loads into all 20 cards simultaneously"
    onkeydown="if(event.key==='Enter')broadcastUrl()"/>
  <button class="btn primary" onclick="broadcastUrl()">▶ Load All 20</button>
  <button class="btn ghost" onclick="stopAll()">■ Clear All</button>
</div>
<div class="progress-wrap"><div class="progress-fill" id="pbar"></div></div>

<!-- MAIN GRID -->
<div class="main">
  <div class="section-header">
    <span class="section-title">20 Video Players — Browser Identity Matrix</span>
    <span style="font-size:8px;color:var(--text3)">Each card runs an independent browser profile from a pool of 520+ user-agents</span>
  </div>
  <div class="grid" id="grid"></div>
</div>

<div class="toast" id="toast"></div>

  if(b.n==="Brave")   return `Mozilla/5.0 (${o.ua}) ${wk} Chrome/124.0.0.0 Safari/537.36`;
  if(b.n==="Vivaldi") return `Mozilla/5.0 (${o.ua}) ${wk} Chrome/124.0.0.0 Safari/537.36 Vivaldi/${v}`;
  if(b.n==="Samsung") return `Mozilla/5.0 (Linux; Android 13; SM-S918B) ${wk} Chrome/124.0.0.0 Mobile Safari/537.36 SamsungBrowser/${v}`;
  return `Mozilla/5.0 (${o.ua}) ${wk} Chrome/${v} Safari/537.36`;
}
function buildPool(){
  const pool=[];
  const rnd=arr=>arr[Math.floor(Math.random()*arr.length)];
  for(const b of BROWSERS){
    for(const o of OS_LIST){
      for(const v of b.v){
        for(let li=0;li<LANGS.length;li+=2){
          pool.push({browser:b.n,icon:b.i,color:b.c,version:v,os:o.n,osShort:o.s,device:o.d,
            lang:LANGS[li],tz:rnd(TZS),res:rnd(RESS),ua:buildUA(b,o,v)});
          if(pool.length>=520)break;
        }
        if(pool.length>=520)break;
      }
      if(pool.length>=520)break;
    }
    if(pool.length>=520)break;
  }
  while(pool.length<520){
    const b=rnd(BROWSERS),o=rnd(OS_LIST),v=rnd(b.v);
    pool.push({browser:b.n,icon:b.i,color:b.c,version:v,os:o.n,osShort:o.s,device:o.d,
      lang:rnd(LANGS),tz:rnd(TZS),res:rnd(RESS),ua:buildUA(b,o,v)});
  }
  return pool;
}
const POOL=buildPool();
document.getElementById("pool-count").textContent=POOL.length;

// ── STATE ────────────────────────────────────────────────────────────────────
const cards=[];
for(let i=0;i<20;i++) cards.push({id:i,profile:null,url:"",playing:false,muted:false,volume:80,collapsed:false,mediaEl:null});
let globalMuteAll=false;
let globalVol=80;

const rnd=arr=>arr[Math.floor(Math.random()*arr.length)];
function pickProfile(){return POOL[Math.floor(Math.random()*POOL.length)]}
function devIcon(d){return d==="Mobile"?"📱":d==="Tablet"?"📟":"🖥️"}

// ── URL PARSER ───────────────────────────────────────────────────────────────
function parseUrl(url){
  if(!url)return null;
  url=url.trim();
  // YouTube watch / short / shorts
  let m=url.match(/(?:youtube\.com\/watch\?.*v=|youtu\.be\/|youtube\.com\/embed\/)([a-zA-Z0-9_-]{11})/);
  if(m) return{type:"yt",id:m[1]};
  m=url.match(/youtube\.com\/shorts\/([a-zA-Z0-9_-]{11})/);
  if(m) return{type:"yt",id:m[1]};
  // Vimeo
  m=url.match(/vimeo\.com\/(\d+)/);
  if(m) return{type:"vimeo",id:m[1]};
  // Dailymotion
  m=url.match(/dailymotion\.com\/video\/([a-zA-Z0-9]+)/);
  if(m) return{type:"dm",id:m[1]};
  // Direct video
  if(url.match(/\.(mp4|webm|ogg|mov)(\?|$)/i)) return{type:"direct",src:url};
  // Generic
  if(url.startsWith("http")) return{type:"iframe",src:url};
  return null;
}

// Build embed URL with mute param baked in — this is the CORRECT fix for iframes
function embedUrl(parsed,muted,vol){
  const mv=muted?1:0;
  if(parsed.type==="yt")
    return `https://www.youtube.com/embed/${parsed.id}?autoplay=1&mute=${mv}&enablejsapi=1&rel=0&modestbranding=1`;
  if(parsed.type==="vimeo")
    return `https://player.vimeo.com/video/${parsed.id}?autoplay=1&muted=${mv}&autopause=0`;
  if(parsed.type==="dm")
    return `https://www.dailymotion.com/embed/video/${parsed.id}?autoplay=1&mute=${mv}`;
  if(parsed.type==="iframe") return parsed.src;
  return null;
}

function shortUrl(url){
  try{const u=new URL(url);return u.hostname+(u.pathname.length>18?u.pathname.slice(0,18)+"…":u.pathname)}catch(e){return url.slice(0,28)+"…"}
}

// ── RENDER ───────────────────────────────────────────────────────────────────
function renderCard(c){
  const p=c.profile;
  const idx=c.id;
  const volPct=c.volume;
  const muteLabel=c.muted?"🔊 Unmute":"🔇 Mute";
  const muteCls=c.muted?"cc muted-btn":"cc";
  const colIcon=c.collapsed?"▼":"▲";
  return `<div class="vcard${c.playing?" playing":""}${c.muted?" muted-state":""}${c.collapsed?" collapsed":""}" id="vc-${idx}">
  <div class="vid-wrap" id="vw-${idx}" ondblclick="toggleCollapse(${idx})">
    <div class="vid-placeholder" id="vph-${idx}" onclick="focusUrl(${idx})">
      <div class="ph-icon">▶</div>
      <div class="ph-text">Click to enter URL · Dbl-click to collapse</div>
    </div>
    <div class="vid-status" id="vst-${idx}" style="display:none">
      <div class="sdot" id="sd-${idx}"></div>
      <span class="slabel" id="sl-${idx}">READY</span>
    </div>
    <div class="vid-corner">
      <button class="corner-btn" title="Collapse card" onclick="toggleCollapse(${idx})">⊟</button>
      <button class="corner-btn" title="Stop" onclick="stopCard(${idx})">✕</button>
    </div>
    <div class="vid-title-overlay" id="vtitle-${idx}">${c.url?shortUrl(c.url):""}</div>
  </div>

  <div class="card-body">
    <div class="profile-header">
      <div class="bbadge" style="border-color:${p.color}55;background:${p.color}12">${p.icon}</div>
      <div>
        <div class="bname">${p.browser}</div>
        <div class="bver">v${p.version}</div>
      </div>
      <div class="cnum">#${String(idx+1).padStart(2,"0")}</div>
    </div>

    <div class="pgrid">
      <div class="prow"><span class="plbl">OS</span><span class="pval hi" title="${p.os}">${p.os}</span></div>
      <div class="prow"><span class="plbl">Device</span><span class="pval">${devIcon(p.device)} ${p.device}</span></div>
      <div class="prow"><span class="plbl">Resolution</span><span class="pval">${p.res}</span></div>
      <div class="prow"><span class="plbl">Timezone</span><span class="pval" title="${p.tz}">${p.tz.replace("_"," ")}</span></div>
      <div class="prow"><span class="plbl">Language</span><span class="pval">${p.lang}</span></div>
      <div class="prow"><span class="plbl">OS Short</span><span class="pval">${p.osShort} · ${p.device.slice(0,3)}</span></div>
    </div>

    <div class="tags">
      <span class="tag os">${p.osShort}</span>
      <span class="tag dev">${p.device}</span>
      <span class="tag lang">${p.lang}</span>
    </div>

    <div class="ua-bar" onclick="copyUA(${idx})" title="Click to copy UA string">
      <span class="copy-hint">copy</span>
      ${p.ua}
    </div>

    <div class="vol-row">
      <span class="vol-icon" onclick="muteCard(${idx})" title="Toggle mute" id="vi-${idx}">${c.muted?"🔇":"🔊"}</span>
      <input type="range" class="vol-slider" min="0" max="100" value="${volPct}"
        id="vslider-${idx}" oninput="setCardVolume(${idx},this.value)" title="Volume"/>
      <span class="vol-pct" id="vpct-${idx}">${volPct}%</span>
    </div>

    <div class="curl-row">
      <input class="curl-input" id="curl-${idx}" type="text"
        placeholder="Video URL for card #${idx+1}…"
        value="${c.url||""}"
        onkeydown="if(event.key==='Enter')playCard(${idx})"/>
      <button class="cplay-btn" onclick="playCard(${idx})">▶ Play</button>
    </div>

    <div class="ccontrols">
      <button class="${muteCls}" id="mbtn-${idx}" onclick="muteCard(${idx})">${muteLabel}</button>
      <button class="cc stop-cc" onclick="stopCard(${idx})">■ Stop</button>
      <button class="cc prof-cc" onclick="rerollCard(${idx})">⟳ Profile</button>
      <button class="cc col-cc" onclick="toggleCollapse(${idx})">${colIcon} Hide</button>
    </div>
  </div>
</div>`;
}

function initGrid(){
  const grid=document.getElementById("grid");
  grid.innerHTML="";
  for(let i=0;i<20;i++){
    cards[i].profile=pickProfile();
    cards[i].url="";cards[i].playing=false;cards[i].muted=false;cards[i].volume=globalVol;cards[i].collapsed=false;cards[i].mediaEl=null;
    grid.insertAdjacentHTML("beforeend",renderCard(cards[i]));
  }
  updateStats();
}

// ── PLAY / STOP ──────────────────────────────────────────────────────────────
function playCard(idx){
  const urlInput=document.getElementById("curl-"+idx);
  const url=(urlInput?urlInput.value.trim():"") || cards[idx].url;
  if(!url){toast("⚠ Paste a video URL first");focusUrl(idx);return}
  cards[idx].url=url;

  const parsed=parseUrl(url);
  const wrap=document.getElementById("vw-"+idx);
  const ph=document.getElementById("vph-"+idx);
  const vcEl=document.getElementById("vc-"+idx);
  const vstEl=document.getElementById("vst-"+idx);
  const sdEl=document.getElementById("sd-"+idx);
  const slEl=document.getElementById("sl-"+idx);
  const titleEl=document.getElementById("vtitle-"+idx);

  // Remove old media
  const old=wrap.querySelector("iframe,video");
  if(old)old.remove();

  if(!parsed){
    sdEl.className="sdot err"; slEl.textContent="BAD URL";
    vstEl.style.display="flex"; ph.style.display="none";
    vcEl.className="vcard error-state"; return;
  }

  ph.style.display="none";
  vstEl.style.display="flex";
  if(titleEl) titleEl.textContent=shortUrl(url);

  if(parsed.type==="direct"){
    const vid=document.createElement("video");
    vid.src=parsed.src; vid.controls=true; vid.autoplay=true;
    vid.muted=cards[idx].muted;
    vid.volume=cards[idx].muted?0:cards[idx].volume/100;
    vid.style.cssText="position:absolute;top:0;left:0;width:100%;height:100%;background:#000";
    wrap.appendChild(vid);
    vid.onplay=()=>{sdEl.className="sdot live";slEl.textContent=cards[idx].muted?"MUTED":"PLAYING";vcEl.className="vcard playing"+(cards[idx].muted?" muted-state":"")};
    vid.onerror=()=>{sdEl.className="sdot err";slEl.textContent="ERROR";vcEl.className="vcard error-state"};
    cards[idx].mediaEl=vid;
  } else {
    const eu=embedUrl(parsed,cards[idx].muted,cards[idx].volume);
    const fr=document.createElement("iframe");
    fr.src=eu;
    fr.allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share";
    fr.allowFullscreen=true;
    fr.style.cssText="position:absolute;top:0;left:0;width:100%;height:100%;border:none";
    wrap.appendChild(fr);
    sdEl.className=cards[idx].muted?"sdot muted":"sdot live";
    slEl.textContent=cards[idx].muted?"MUTED":"PLAYING";
    vcEl.className="vcard playing"+(cards[idx].muted?" muted-state":"");
    cards[idx].mediaEl=fr;
  }

  cards[idx].playing=true;
  updateStats();
}

function stopCard(idx){
  const wrap=document.getElementById("vw-"+idx);
  const ph=document.getElementById("vph-"+idx);
  const vcEl=document.getElementById("vc-"+idx);
  const vstEl=document.getElementById("vst-"+idx);
  const old=wrap.querySelector("iframe,video");
  if(old)old.remove();
  ph.style.display="flex";
  vstEl.style.display="none";
  vcEl.className="vcard"+(cards[idx].collapsed?" collapsed":"");
  cards[idx].playing=false;
  cards[idx].url="";
  cards[idx].mediaEl=null;
  const ui=document.getElementById("curl-"+idx);
  if(ui)ui.value="";
  const ti=document.getElementById("vtitle-"+idx);
  if(ti)ti.textContent="";
  updateStats();
}

// ── MUTE — correct approach: reload iframe with mute param ──────────────────
function muteCard(idx){
  cards[idx].muted=!cards[idx].muted;
  const m=cards[idx].muted;

  // Update UI labels
  const mbtn=document.getElementById("mbtn-"+idx);
  const vi=document.getElementById("vi-"+idx);
  const slEl=document.getElementById("sl-"+idx);
  const sdEl=document.getElementById("sd-"+idx);
  const vcEl=document.getElementById("vc-"+idx);

  if(mbtn){mbtn.textContent=m?"🔊 Unmute":"🔇 Mute";mbtn.className=m?"cc muted-btn":"cc"}
  if(vi) vi.textContent=m?"🔇":"🔊";

  // For direct <video> elements, set .muted directly
  const wrap=document.getElementById("vw-"+idx);
  const vid=wrap?wrap.querySelector("video"):null;
  if(vid){
    vid.muted=m;
    vid.volume=m?0:cards[idx].volume/100;
    if(slEl)slEl.textContent=m?"MUTED":"PLAYING";
    if(sdEl)sdEl.className=m?"sdot muted":"sdot live";
  }

  // For iframes (YouTube/Vimeo/etc), reload with mute param baked into URL
  const fr=wrap?wrap.querySelector("iframe"):null;
  if(fr&&cards[idx].playing&&cards[idx].url){
    const parsed=parseUrl(cards[idx].url);
    if(parsed){
      const eu=embedUrl(parsed,m,cards[idx].volume);
      fr.src=eu; // reload iframe with correct mute param
      if(slEl)slEl.textContent=m?"MUTED":"PLAYING";
      if(sdEl)sdEl.className=m?"sdot muted":"sdot live";
    }
  }

  // Update card border
  if(vcEl){
    let cls="vcard";
    if(cards[idx].playing)cls+=" playing";
    if(m)cls+=" muted-state";
    if(cards[idx].collapsed)cls+=" collapsed";
    vcEl.className=cls;
  }

  updateStats();
}

// ── VOLUME — for <video> direct; for iframes we reload with mute=0 ──────────
function setCardVolume(idx,val){
  cards[idx].volume=parseInt(val);
  const pct=document.getElementById("vpct-"+idx);
  if(pct)pct.textContent=val+"%";

  // If muted and they turn up volume, auto-unmute
  if(cards[idx].muted&&parseInt(val)>0){
    cards[idx].muted=false;
    const mbtn=document.getElementById("mbtn-"+idx);
    const vi=document.getElementById("vi-"+idx);
    if(mbtn){mbtn.textContent="🔇 Mute";mbtn.className="cc"}
    if(vi)vi.textContent="🔊";
  }

  const wrap=document.getElementById("vw-"+idx);
  const vid=wrap?wrap.querySelector("video"):null;
  if(vid){vid.volume=parseInt(val)/100;vid.muted=false}

  // For iframes, volume slider doesn't cross-origin control them, so just track state
  updateStats();
}

function setGlobalVolume(val){
  globalVol=parseInt(val);
  document.getElementById("gvol-pct").textContent=val+"%";
  for(let i=0;i<20;i++){
    cards[i].volume=globalVol;
    const sl=document.getElementById("vslider-"+i);
    const pc=document.getElementById("vpct-"+i);
    if(sl)sl.value=globalVol;
    if(pc)pc.textContent=globalVol+"%";
    const wrap=document.getElementById("vw-"+i);
    const vid=wrap?wrap.querySelector("video"):null;
    if(vid&&!cards[i].muted)vid.volume=globalVol/100;
  }
}

// ── COLLAPSE ─────────────────────────────────────────────────────────────────
function toggleCollapse(idx){
  cards[idx].collapsed=!cards[idx].collapsed;
  const vcEl=document.getElementById("vc-"+idx);
  if(!vcEl)return;
  let cls="vcard";
  if(cards[idx].playing)cls+=" playing";
  if(cards[idx].muted)cls+=" muted-state";
  if(cards[idx].collapsed)cls+=" collapsed";
  vcEl.className=cls;
  const cbtn=vcEl.querySelector(".col-cc");
  if(cbtn)cbtn.textContent=cards[idx].collapsed?"▼ Show":"▲ Hide";
}

// ── PROFILE REROLL ───────────────────────────────────────────────────────────
function rerollCard(idx){
  cards[idx].profile=pickProfile();
  const old=document.getElementById("vc-"+idx);
  if(!old)return;
  const url=cards[idx].url;
  const wasPlaying=cards[idx].playing;

  // Remove old iframe/video before re-render
  const wrap=old.querySelector(`#vw-${idx}`);
  if(wrap){const med=wrap.querySelector("iframe,video");if(med)med.remove();}
  cards[idx].playing=false;cards[idx].mediaEl=null;

  const tmp=document.createElement("div");
  tmp.innerHTML=renderCard(cards[idx]);
  const nc=tmp.firstChild;
  nc.style.animationDelay="0s";
  old.parentNode.replaceChild(nc,old);

  if(url){
    const ui=document.getElementById("curl-"+idx);
    if(ui)ui.value=url;
    cards[idx].url=url;
    if(wasPlaying)setTimeout(()=>playCard(idx),80);
  }
  updateStats();
}

// ── COPY UA ──────────────────────────────────────────────────────────────────
function copyUA(idx){
  const ua=cards[idx].profile.ua;
  navigator.clipboard.writeText(ua).then(()=>toast("✓ UA copied")).catch(()=>toast("⚠ Copy failed — select text manually"));
}

// ── GLOBAL CONTROLS ──────────────────────────────────────────────────────────
function broadcastUrl(){
  const url=document.getElementById("global-url").value.trim();
  if(!url){toast("⚠ Paste a URL in the Broadcast field");return}
  animateProgress(()=>{
    for(let i=0;i<20;i++){
      const ui=document.getElementById("curl-"+i);
      if(ui)ui.value=url;
      cards[i].url=url;
    }
  },()=>{
    let i=0;
    function nxt(){if(i>=20)return;playCard(i++);setTimeout(nxt,90)}
    nxt();
  });
}

function playAll(){
  for(let i=0;i<20;i++){const u=cards[i].url||(document.getElementById("curl-"+i)||{}).value||"";if(u){cards[i].url=u;playCard(i)}}
}
function stopAll(){for(let i=0;i<20;i++)stopCard(i)}

let allMuted=false;
function toggleMuteAll(){
  allMuted=!allMuted;
  for(let i=0;i<20;i++){
    if(allMuted!==cards[i].muted) muteCard(i);
  }
  const btn=document.getElementById("muteall-btn");
  if(btn)btn.textContent=allMuted?"🔊 Unmute All":"🔇 Mute All";
  toast(allMuted?"All cards muted":"All cards unmuted");
}

function randomizeAllProfiles(){
  for(let i=0;i<20;i++)rerollCard(i);
  toast("⟳ All 20 profiles randomized");
}

// ── HELPERS ──────────────────────────────────────────────────────────────────
function focusUrl(idx){
  setTimeout(()=>{const u=document.getElementById("curl-"+idx);if(u)u.focus();},50)
}
function setcols(n){
  document.documentElement.style.setProperty("--cols",n);
  document.querySelectorAll(".vt-btn").forEach((b,i)=>{b.classList.toggle("on",[2,3,4,5][i]===n)});
}
function updateStats(){
  document.getElementById("active-count").textContent=cards.filter(c=>c.playing).length;
  document.getElementById("muted-count").textContent=cards.filter(c=>c.muted).length;
}
function animateProgress(setup,after){
  const bar=document.getElementById("pbar");
  bar.style.width="0%";
  if(setup)setup();
  let p=0;
  const iv=setInterval(()=>{p+=7;bar.style.width=Math.min(p,95)+"%";if(p>=95){clearInterval(iv);if(after)after();setTimeout(()=>bar.style.width="0%",800)}},60);
}
let toastTimer;
function toast(msg){
  const t=document.getElementById("toast");
  t.textContent=msg;t.classList.add("show");
  clearTimeout(toastTimer);
  toastTimer=setTimeout(()=>t.classList.remove("show"),2200);
}

// ── BOOT ─────────────────────────────────────────────────────────────────────
initGrid();
</script>
